    <script>
    let particles = [];
    const MAX_DIST = 120; // Distância ideal para conexões geométricas nítidas
    const TOTAL_PARTICLES = 60; // Densidade perfeita para preencher a tela inteira

    function setup() {
        let canvas = createCanvas(windowWidth, windowHeight);
        canvas.position(0, 0);
        canvas.style('z-index', '-1'); 
        background(5); // Inicia o espaço limpo

        // Distribui as partículas iniciais por toda a tela para não nascer vazio
        for (let i = 0; i < TOTAL_PARTICLES; i++) {
            particles.push(new Particle(random(width), random(height)));
        }
    }

    function draw() {
        // CORREÇÃO DAS MANCHAS: Aumentamos a opacidade do fundo para limpar os rastros antigos perfeitamente
        background(5, 45); 
        
        // Mantém o gerador ativo na base da tela
        if (particles.length < TOTAL_PARTICLES) {
            particles.push(new Particle(random(width), height + 10));
        }

        // Atualiza, move e conecta a rede somática
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].display();
            
            // Lógica de Conexão da Constelação
            for (let j = i + 1; j < particles.length; j++) {
                let d = dist(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                if (d < MAX_DIST) {
                    let alphaLine = map(d, 0, MAX_DIST, min(particles[i].alpha, particles[j].alpha), 0);
                    stroke(0, 255, 65, alphaLine * 0.4); // Verde neon responsivo
                    strokeWeight(1);
                    line(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                }
            }
        }

        // Faxina da Memória: Remove quem sumiu ou ultrapassou o topo
        for (let i = particles.length - 1; i >= 0; i--) {
            if (particles[i].isDead()) {
                particles.splice(i, 1);
            }
        }
    }

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            // FÍSICA CORRIGIDA: Velocidade ascendente real (-2.5 a -1.2) para fazê-las subir sem travar
            this.vx = random(-0.5, 0.5);
            this.vy = random(-2.5, -1.2); 
            this.alpha = 255; // Nascem com brilho máximo
            this.size = random(2.5, 5); // Nós nítidos de dados
            // Desaparecimento suave para permitir que cruzem a tela antes de morrer
            this.fadeSpeed = random(0.8, 1.5); 
        }
        
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= this.fadeSpeed;
        }
        
        display() {
            noStroke();
            fill(0, 255, 65, this.alpha);
            ellipse(this.x, this.y, this.size, this.size);
        }
        
        isDead() {
            // Morre se perder o brilho por completo ou se passar do topo da tela
            return this.alpha <= 0 || this.y < -10;
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        background(5); // Limpa resíduos ao redimensionar a tela
    }
    </script>
