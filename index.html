    <script>
    let particles = [];
    const MAX_DIST = 120; 
    const TOTAL_PARTICLES = 190; 

    function setup() {
        let canvas = createCanvas(windowWidth, windowHeight);
        canvas.position(0, 0);
        
        canvas.style('z-index', '-1'); 
        canvas.style('position', 'fixed');
        canvas.style('top', '0');
        canvas.style('left', '0');
        canvas.style('backdrop-filter', 'blur(4px) brightness(0.9)'); 
        canvas.style('-webkit-backdrop-filter', 'blur(4px) brightness(0.9)');
        
        background(5); 
    }

    function draw() {
        background(5); 
        
        // ALIMENTAÇÃO LATERAL: Injeta partículas pelas bordas esquerda e direita
        if (particles.length < TOTAL_PARTICLES) {
            let groupY = random(height); 
            
            for (let k = 0; k < 2; k++) {
                let offsetY = random(-60, 60);
                
                let side = random(1) > 0.5 ? 0 : 1;
                let spawnX = side === 0 ? -30 : width + 30; 
                let spawnY = groupY + offsetY;
                
                let direction = side === 0 ? 1 : -1;
                
                particles.push(new Particle(spawnX, spawnY, direction));
            }
        }

        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].display();
            
            for (let j = i + 1; j < particles.length; j++) {
                let d = dist(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                if (d < MAX_DIST) {
                    let alphaLine = map(d, 0, MAX_DIST, min(particles[i].alpha, particles[j].alpha), 0);
                    stroke(0, 255, 65, alphaLine * 0.35); 
                    strokeWeight(0.8);
                    line(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                }
            }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            if (particles[i].isDead()) {
                particles.splice(i, 1);
            }
        }
    }

    class Particle {
        constructor(x, y, direction) {
            this.x = x;
            this.y = y;
            this.dir = direction; 
            this.isMobile = windowWidth < 768;
            
            let speedFactor = this.isMobile ? random(1.2, 2.4) : random(0.5, 1.4);
            this.vx = speedFactor * this.dir;
            this.vy = random(-0.2, 0.2); 
            
            this.noiseSeed = random(5000);
            this.oscillateSpeed = random(0.005, 0.015);
            
            this.alpha = random(120, 255); 
            this.size = random(1.8, 4.2);  
            this.fadeSpeed = this.isMobile ? random(0.12, 0.25) : random(0.03, 0.08); 
        }
        
        update() {
            this.noiseSeed += this.oscillateSpeed;
            let drift = sin(this.noiseSeed) * random(-0.4, 0.4);
            
            this.x += this.vx; 
            this.y += this.vy + drift; 
            this.alpha -= this.fadeSpeed; 
        }
        
        display() {
            // CAPPING DE SEGURANÇA MOBILE: Impede cruzamento na área do footer institucional
            if (this.isMobile && this.y > windowHeight - 140) {
                return; 
            }
            
            noStroke();
            fill(0, 255, 65, this.alpha);
            ellipse(this.x, this.y, this.size, this.size);
        }
        
        isDead() {
            return (
                this.alpha <= 0 || 
                this.x < -60 || 
                this.x > windowWidth + 60 ||
                this.y < -60 ||
                this.y > windowHeight + 60
            );
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        background(5);
    }
    </script>
