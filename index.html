    <script>
    let particles = [];
    const MAX_DIST = 120; // Conexões moleculares precisas
    const TOTAL_PARTICLES = 190; // Densidade ideal para não sobrecarregar a tela

    function setup() {
        let canvas = createCanvas(windowWidth, windowHeight);
        canvas.position(0, 0);
        
        /* APLICAÇÃO DE GLASSMORPHISM DIRETO NO CANVAS DA CONSTELAÇÃO */
        canvas.style('z-index', '-1'); 
        canvas.style('position', 'fixed');
        canvas.style('top', '0');
        canvas.style('left', '0');
        canvas.style('backdrop-filter', 'blur(4px) brightness(0.9)'); // Névoa sci-fi sutil de fundo
        canvas.style('-webkit-backdrop-filter', 'blur(4px) brightness(0.9)');
        
        background(5); // Inicializa o espaço preto totalmente limpo
        
        // CORREÇÃO EFETUADA: Retirado o laço que povoava a tela de início.
        // O array agora nasce vazio para as partículas emergirem estritamente do rodapé!
    }

    function draw() {
        // SOLUÇÃO CRÍTICA DAS MANCHAS: Fundo preto puro (0-255) redesenhado a cada frame. 
        background(5); 
        
        // ALIMENTAÇÃO EM GRUPOS DISPERSOS: Evita que nasçam grudadas na mesma coordenada
        if (particles.length < TOTAL_PARTICLES) {
            // Sorteia uma coordenada X central para o cluster da vez
            let groupX = random(width); 
            
            for (let k = 0; k < 2; k++) {
                // JITTER ESPACIAL: Garante um distanciamento físico de respiro no nascimento
                let offsetX = random(-80, 80);
                let offsetY = random(0, 40);
                
                particles.push(new Particle(groupX + offsetX, height + 30 + offsetY));
            }
        }

        // Desenha e conecta a malha de dados somáticos
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].display();
            
            // Conexões de filamentos de luz
            for (let j = i + 1; j < particles.length; j++) {
                let d = dist(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                if (d < MAX_DIST) {
                    // Calcula a opacidade da linha com base na vida das duas partículas conectadas
                    let alphaLine = map(d, 0, MAX_DIST, min(particles[i].alpha, particles[j].alpha), 0);
                    stroke(0, 255, 65, alphaLine * 0.35); // Linhas finas verde-neon reativas
                    strokeWeight(0.8);
                    line(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                }
            }
        }

        // Faxina da Memória: Remove quem passou do topo ou sumiu por completo
        for (let i = particles.length - 1; i >= 0; i--) {
            if (particles[i].isDead()) {
                particles.splice(i, 1);
            }
        }
    }

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            
            // Física de Poeira Cósmica: Subida flutuante e cadenciada
            this.vy = random(-1.0, -0.4); 
            
            // Sementes matemáticas para o movimento ondulatório orgânico
            this.noiseSeed = random(5000);
            this.oscillateSpeed = random(0.008, 0.02);
            
            this.alpha = random(100, 255); // Brilho inicial randômico para dar profundidade 3D
            this.size = random(1.8, 4.2);  // Tamanhos de grãos variados
            this.fadeSpeed = random(0.04, 0.12); // Garante fôlego para cruzar a tela toda
        }
        
        update() {
            // O Balanço Somático Horizontal (Efeito Drift)
            this.noiseSeed += this.oscillateSpeed;
            let drift = sin(this.noiseSeed) * random(-0.5, 0.5);
            
            this.x += drift; 
            this.y += this.vy; 
            this.alpha -= this.fadeSpeed; // O enfraquecimento individual substitui o rastro borrado do fundo
        }
        
        display() {
            noStroke();
            // Renderiza a partícula pura com o canal de transparência limpo
            fill(0, 255, 65, this.alpha);
            ellipse(this.x, this.y, this.size, this.size);
        }
        
        isDead() {
            // Só deixa morrer quando o brilho some ou passa da margem superior
            return this.alpha <= 0 || this.y < -30;
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        background(5);
    }
    </script>
