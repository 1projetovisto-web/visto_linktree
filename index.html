    <script>
    let particles = [];
    const MAX_DIST = 125; // Distância perfeita para conexões fluídas
    const TOTAL_PARTICLES = 70; // Densidade ideal para gerar profundidade cósmica

    function setup() {
        let canvas = createCanvas(windowWidth, windowHeight);
        canvas.position(0, 0);
        canvas.style('z-index', '-1'); 
        background(5);

        // Distribui as partículas por toda a tela no nascimento para preenchimento imediato
        for (let i = 0; i < TOTAL_PARTICLES; i++) {
            particles.push(new Particle(random(width), random(height)));
        }
    }

    function draw() {
        // Mantém o espaço limpo e o rastro sutil de poeira antiga
        background(5, 35); 
        
        // Alimenta o fluxo continuamente a partir do rodapé
        if (particles.length < TOTAL_PARTICLES) {
            particles.push(new Particle(random(width), height + 20));
        }

        // Move, oscila e conecta a constelação
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].display();
            
            for (let j = i + 1; j < particles.length; j++) {
                let d = dist(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                if (d < MAX_DIST) {
                    let alphaLine = map(d, 0, MAX_DIST, min(particles[i].alpha, particles[j].alpha), 0);
                    stroke(0, 255, 65, alphaLine * 0.3); // Conexões verde-neon em filamentos finos
                    strokeWeight(0.75); // Linhas ultra-finas sci-fi
                    line(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                }
            }
        }

        // Limpeza da memória
        for (let i = particles.length - 1; i >= 0; i--) {
            if (particles[i].isDead()) {
                particles.splice(i, 1);
            }
        }
    }

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            
            // FÍSICA DE POEIRA: Subida extremamente lenta e flutuante
            this.vy = random(-0.9, -0.4); 
            
            // Variáveis para criar o balanço orgânico individual
            this.noiseSeed = random(1000); 
            this.oscillateSpeed = random(0.01, 0.03);
            
            this.alpha = random(120, 255); // Variação de brilho inicial gera profundidade
            this.size = random(1.5, 4.0); // Tamanhos variados (partículas mais distantes e mais próximas)
            this.fadeSpeed = random(0.15, 0.3); // Longevidade garantida até o topo
        }
        
        update() {
            // A MÁGICA DA POEIRA: O movimento horizontal oscila usando Seno e Perlin Noise
            this.noiseSeed += this.oscillateSpeed;
            let drift = sin(this.noiseSeed) * random(-0.4, 0.4);
            
            this.x += drift; // Desvio lateral fluido
            this.y += this.vy; // Subida contínua lenta
            this.alpha -= this.fadeSpeed; // Perda de energia super suave
        }
        
        display() {
            noStroke();
            // Aplica o brilho verde-neon proporcional à vida da poeira
            fill(0, 255, 65, this.alpha);
            ellipse(this.x, this.y, this.size, this.size);
        }
        
        isDead() {
            // Cruza a tela inteira e só morre no topo ou se apagar por completo
            return this.alpha <= 0 || this.y < -30;
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
        background(5);
    }
    </script>
