    <script>
    let particles = [];
    const MAX_DIST = 100; // Distância máxima para as estrelas se conectarem com linhas

    function setup() {
        let canvas = createCanvas(windowWidth, windowHeight);
        canvas.position(0, 0);
        canvas.style('z-index', '-1'); 
        background(5);
    }

    function draw() {
        background(5, 25); // Mantém o rastro orgânico de fundo
        
        // Cria partículas se o mouse mexer ou for pressionado
        if (mouseIsPressed || (mouseX !== pmouseX && mouseY !== pmouseY)) {
            particles.push(new Particle(mouseX, mouseY));
        }

        // Atualiza e desenha as partículas
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].display();
            
            // LÓGICA DA CONSTELAÇÃO: Conecta partículas próximas com linhas sutis
            for (let j = i + 1; j < particles.length; j++) {
                let d = dist(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                if (d < MAX_DIST) {
                    // A opacidade da linha depende da distância e da vida da partícula
                    let alphaLine = map(d, 0, MAX_DIST, min(particles[i].alpha, particles[j].alpha), 0);
                    stroke(0, 255, 65, alphaLine * 0.4); // Verde neon sutil nas conexões
                    strokeWeight(1);
                    line(particles[i].x, particles[i].y, particles[j].x, particles[j].y);
                }
            }
        }

        // Remove as partículas mortas da memória
        for (let i = particles.length - 1; i >= 0; i--) {
            if (particles[i].isDead()) {
                particles.splice(i, 1);
            }
        }
    }

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            // Velocidade de expansão orgânica
            this.vx = random(-1.5, 1.5);
            this.vy = random(-1.5, 1.5);
            this.alpha = 255;
            this.size = random(2, 4.5); // Nós de estrelas pequenos e nítidos
        }
        
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= 3.5; // Ritmo orgânico de fade-out
        }
        
        display() {
            noStroke();
            fill(0, 255, 65, this.alpha);
            ellipse(this.x, this.y, this.size, this.size);
        }
        
        isDead() {
            return this.alpha <= 0;
        }
    }

    function windowResized() {
        resizeCanvas(windowWidth, windowHeight);
    }
    </script>
